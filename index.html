<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="0zhCJCz5c_brIVRanL1nKKvFmESnjqcpxVFuphzt0Bg" />
    <title>MunkenTipset 2026</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.webp');
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            z-index: -1;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem 2rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            text-align: center;
            max-width: 420px;
            width: 90%;
            backdrop-filter: blur(10px);
        }
        h1 { color: #333; margin-bottom: 0.5rem; font-size: 1.8rem; }
        .subtitle { color: #666; font-size: 1rem; margin-bottom: 1.5rem; }
        .btn-google {
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
        }
        .btn-google:hover { background-color: #357ae8; transform: translateY(-1px); }
        .btn-google:active { transform: translateY(0); }
        #error-message {
            margin-top: 1.2rem;
            font-size: 14px;
            display: none;
            background: #fff8e1;
            color: #5d4037;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid #ffe082;
            line-height: 1.5;
            text-align: left;
        }
        #error-message a {
            color: #4285F4;
            text-decoration: none;
            font-weight: bold;
        }
        #error-message a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="login-card" id="login-card" style="visibility:hidden;">
        <button id="login-btn" class="btn-google">Logga in med Google</button>
        <div id="error-message"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { firebaseConfig } from './js/config.js';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ hd: 'nyamunken.se' });

        function hasThreeDigitCode(email) {
            const localPart = email.split('@')[0];
            return /\d{3}/.test(localPart);
        }

        function isAllowedEmail(email) {
            const e = (email || '').toLowerCase();
            return e.endsWith('@nyamunken.se') && !e.startsWith('qq') && !hasThreeDigitCode(e);
        }

        // Auto-redirect already-authenticated users straight into the dashboard
        // so the splash screen doesn't flash a "Logga in" button for them.
        onAuthStateChanged(auth, (user) => {
            if (user && isAllowedEmail(user.email)) {
                window.location.replace('dashboard.html');
            } else {
                // No valid session — reveal the login card
                document.getElementById('login-card').style.visibility = 'visible';
            }
        });

        // Popup (not redirect) because the site is served from munkentipset.se
        // but Firebase authDomain is jonas-hemsida.firebaseapp.com — with
        // signInWithRedirect the session is set under the Firebase domain and
        // can't be read back on munkentipset.se, so the user lands on the
        // login page again. Popup avoids the cross-domain handoff entirely.
        document.getElementById('login-btn').addEventListener('click', () => {
            const errorMsg = document.getElementById('error-message');
            errorMsg.style.display = 'none';
            signInWithPopup(auth, provider).then((result) => {
                const email = result.user.email || '';
                if (isAllowedEmail(email)) {
                    window.location.href = 'dashboard.html';
                } else {
                    signOut(auth).then(() => {
                        errorMsg.innerHTML = 'Hej! Kul att du hittade hit 👋 MunkenTipset är dock en intern sida för lärare på Nya Munken. Vill du veta mer om skolan? Kika gärna in på <a href="https://www.nyamunken.se/" target="_blank">nyamunken.se</a>!';
                        errorMsg.style.display = 'block';
                    });
                }
            }).catch((error) => {
                if(error.code !== 'auth/popup-closed-by-user') {
                    errorMsg.textContent = "Ett fel uppstod: " + error.message;
                    errorMsg.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
